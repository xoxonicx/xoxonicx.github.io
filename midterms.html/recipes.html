<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Gourmet Hub | Premium Recipes</title>

    <!-- Bootstrap 5.3 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- React and Babel -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        :root {
            --primary-color: #2D3436;
            --accent-color: #0984E3;
            --bg-light: #F9FAFB;
            --star-color: #FFB800;
        }

        body {
            background-color: var(--bg-light);
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: var(--primary-color);
        }

        .navbar {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .hero-section {
            position: relative;
            padding: 160px 0 120px;
            background-image: url('https://images.unsplash.com/photo-1504674900247-0877df9cc836?q=80&w=2070');
            background-size: cover;
            background-position: center;
            border-radius: 0 0 50px 50px;
            margin-bottom: 50px;
            color: white;
            overflow: hidden;
        }

        .hero-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            z-index: 1;
        }

        .hero-content {
            position: relative;
            z-index: 2;
        }

        .search-container {
            max-width: 600px;
            margin: 0 auto;
        }

        .search-group {
            position: relative;
            display: flex;
            gap: 10px;
            background: #fff;
            padding: 8px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        .search-group i {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: #A0AEC0;
        }

        .search-group .form-control {
            border: none;
            padding-left: 45px;
            box-shadow: none !important;
        }

        .recipe-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: none;
            border-radius: 20px;
            overflow: hidden;
            background: #fff;
        }

        .recipe-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08) !important;
        }

        .card-img-top {
            height: 240px;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .recipe-card:hover .card-img-top {
            transform: scale(1.1);
        }

        .badge-category {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(255, 255, 255, 0.9);
            color: var(--accent-color);
            padding: 5px 15px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.8rem;
            z-index: 10;
        }

        .footer {
            background: #fff;
            padding: 40px 0;
            margin-top: 80px;
            border-top: 1px solid rgba(0, 0, 0, 0.05);
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [data, setData] = useState([]);
            const [loading, setLoading] = useState(true);
            const [searchTerm, setSearchTerm] = useState("");
            const [selectedCourse, setSelectedCourse] = useState("");
            const [selectedRecipe, setSelectedRecipe] = useState(null);

            const categories = ["Main Course", "Breakfast", "Lunch", "Snacks and Sandwiches", "Desserts", "Side Dishes", "Soup"];

            const normalizeCourse = (course) => {
                if (!course) return "";
                const c = course.toLowerCase();
                if (c.includes("main") || c.includes("dinner")) return "Main Course";
                if (c.includes("breakfast")) return "Breakfast";
                if (c.includes("lunch")) return "Lunch";
                if (c.includes("dessert")) return "Desserts";
                if (c.includes("side")) return "Side Dishes";
                if (c.includes("soup")) return "Soup";
                if (c.includes("snack") || c.includes("sandwich")) return "Snacks and Sandwiches";
                return course;
            };

            const getData = async () => {
                try {
                    const resp = await fetch('https://api.sampleapis.com/recipes/recipes');
                    const json = await resp.json();
                    setData(json);
                    setLoading(false);
                } catch (err) {
                    console.error(err.message);
                    setLoading(false);
                }
            }

            useEffect(() => {
                getData();
            }, []);

            // Isang filteredData lang para hindi mag-error ang redeclaration
            const filteredData = data.filter(recipe => {
                const matchSearch =
                    searchTerm === "" ||
                    recipe.title?.toLowerCase().includes(searchTerm.toLowerCase()) ||
                    recipe.cuisine?.toLowerCase().includes(searchTerm.toLowerCase());

                const matchCategory =
                    selectedCourse === "" ||
                    normalizeCourse(recipe.course) === selectedCourse;

                return matchSearch && matchCategory;
            });

            return (
                <div>
                    <nav className="navbar navbar-expand-lg">
                        <div className="container">
                            <a className="navbar-brand fw-bold fs-4" href="#" onClick={(e) => {
                                e.preventDefault();
                                setSearchTerm("");
                                setSelectedCourse("");
                            }}>
                                GOURMET<span className="text-info">HUB</span>
                            </a>
                            <button className="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                                <span className="navbar-toggler-icon"></span>
                            </button>
                            <div className="collapse navbar-collapse" id="navbarNav">
                                <ul className="navbar-nav ms-auto fw-semibold">
                                    <li className="nav-item">
                                        <a className="nav-link" href="#" onClick={(e) => { e.preventDefault(); setSearchTerm(""); setSelectedCourse(""); }}>Home</a>
                                    </li>
                                    <li className="nav-item dropdown">
                                        <a className="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">Categories</a>
                                        <ul className="dropdown-menu border-0 shadow">
                                            <li><button className="dropdown-item" onClick={() => setSelectedCourse("")}>All Recipes</button></li>
                                            {categories.map(cat => (
                                                <li key={cat}>
                                                    <button className="dropdown-item" onClick={() => {
                                                        setSelectedCourse(cat);
                                                        setSearchTerm("");
                                                    }}>{cat}</button>
                                                </li>
                                            ))}
                                        </ul>
                                    </li>
                                </ul>
                            </div>
                        </div>
                    </nav>

                    <header className="hero-section text-center">
                        <div className="container hero-content">
                            <h1 className="display-3 fw-bold mb-3 text-white">Master the Art of <br /> Modern Cooking</h1>
                            <p className="lead text-light mx-auto mb-5" style={{ maxWidth: '600px' }}>
                                Explore curated recipes from our API. Simple ingredients, extraordinary results.
                            </p>
                            <div className="search-container">
                                <div className="search-group">
                                    <i className="bi bi-search"></i>
                                    <input
                                        type="text"
                                        className="form-control"
                                        placeholder="Search title or cuisine..."
                                        value={searchTerm}
                                        onChange={(e) => setSearchTerm(e.target.value)}
                                    />
                                    <button className="btn btn-primary px-4 rounded-3">Search</button>
                                </div>
                            </div>
                        </div>
                    </header>

                    <main className="container pb-5">
                        <div className="mb-5">
                            <h2 className="fw-bold">
                                {selectedCourse ? `${selectedCourse} Recipes` : searchTerm ? `Results for "${searchTerm}"` : "Trending Recipes"}
                            </h2>
                            <p className="text-muted">{filteredData.length} recipes found.</p>
                        </div>

                        {loading ? (
                            <div className="text-center py-5">
                                <div className="spinner-grow text-info"></div>
                                <p className="mt-3">Fetching delicious data...</p>
                            </div>
                        ) : (
                            <div className="row g-4">
                                {filteredData.map((recipe) => (
                                    <div className="col-md-6 col-lg-4" key={recipe.id}>
                                        <div className="card h-100 recipe-card shadow-sm">
                                            <span className="badge-category shadow-sm">{recipe.cuisine || 'Recipe'}</span>
                                            <img
                                                src={recipe.photoUrl}
                                                className="card-img-top"
                                                alt={recipe.title}
                                                onError={(e) => { e.target.src = 'https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=500'; }}
                                            />
                                            <div className="card-body p-4 d-flex flex-column">
                                                <h5 className="card-title fw-bold text-dark">{recipe.title}</h5>
                                                <p className="card-text text-muted small">
                                                    {recipe.description || `A tasty ${recipe.course} dish featuring ${recipe.mainIngredient}.`}
                                                </p>
                                                <div className="mt-auto pt-3 border-top d-flex justify-content-between align-items-center">
                                                    <span className="small text-muted"><i className="bi bi-clock me-1"></i>{recipe.totalTime || 30}m</span>
                                                    <button
                                                        className="btn btn-outline-primary btn-sm px-3 rounded-pill"
                                                        data-bs-toggle="modal"
                                                        data-bs-target="#recipeModal"
                                                        onClick={() => setSelectedRecipe(recipe)}
                                                    >View Full Recipe</button>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>

                    {/* Dynamic Modal */}
                    <div className="modal fade" id="recipeModal" tabIndex="-1" aria-hidden="true">
                        <div className="modal-dialog modal-dialog-centered modal-lg">
                            <div className="modal-content shadow-lg border-0" style={{ borderRadius: '25px' }}>
                                {selectedRecipe && (
                                    <React.Fragment>
                                        <div className="modal-header border-0 px-4 pt-4">
                                            <h3 className="fw-bold text-dark mb-0">{selectedRecipe.title}</h3>
                                            <button type="button" className="btn-close" data-bs-dismiss="modal"></button>
                                        </div>
                                        <div className="modal-body px-4 pb-4">
                                            <div className="row g-4">
                                                <div className="col-md-5">
                                                    <img
                                                        src={selectedRecipe.photoUrl}
                                                        className="img-fluid rounded-4 shadow-sm mb-3 w-100"
                                                        style={{ objectFit: 'cover', height: '250px' }}
                                                        onError={(e) => { e.target.src = 'https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=500'; }}
                                                    />
                                                    <div className="p-3 bg-light rounded-4 border small">
                                                        <p className="mb-1"><strong><i className="bi bi-geo-alt me-2 text-primary"></i>Cuisine:</strong> {selectedRecipe.cuisine}</p>
                                                        <p className="mb-1"><strong><i className="bi bi-clock me-2 text-primary"></i>Prep Time:</strong> {selectedRecipe.prepTime}m</p>
                                                        <p className="mb-1"><strong><i className="bi bi-fire me-2 text-primary"></i>Cook Time:</strong> {selectedRecipe.cookTime}m</p>
                                                        <p className="mb-0"><strong><i className="bi bi-people me-2 text-primary"></i>Yield:</strong> {selectedRecipe.yield} servings</p>
                                                    </div>
                                                </div>
                                                <div className="col-md-7">
                                                    <h5 className="fw-bold mb-2">Ingredients</h5>
                                                    <ul className="text-muted small mb-4">
                                                        {selectedRecipe.ingredients?.split('\n').map((ing, index) => (
                                                            <li key={index}>{ing}</li>
                                                        ))}
                                                    </ul>
                                                    <h5 className="fw-bold mb-2">Directions</h5>
                                                    <p className="text-muted small" style={{ whiteSpace: 'pre-line' }}>
                                                        {selectedRecipe.directions}
                                                    </p>
                                                </div>
                                            </div>
                                        </div>
                                    </React.Fragment>
                                )}
                            </div>
                        </div>
                    </div>

                    <footer className="footer text-center">
                        <div className="container">
                            <p className="fw-bold fs-4 mb-2">GOURMET<span className="text-info">HUB</span></p>
                            <p className="text-muted small mb-0">© 2026 Premium Recipe Portal. Data from SampleAPIs.</p>
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
